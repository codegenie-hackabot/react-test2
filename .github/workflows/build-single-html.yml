name: Build React App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read          # Only need to read the repository contents

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload index.html to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PROJECT: ${{ github.repository }}
        run: |
          # Read the built index.html file
          if [ ! -f dist/index.html ]; then
            echo "dist/index.html not found!"
            exit 1
          fi
          content=$(cat dist/index.html)

          # Escape the content for JSON using jq (pre-installed on ubuntu-latest)
          # This properly handles special characters, newlines, etc.
          escaped_content=$(echo "$content" | jq -R -s '.')

          # Build JSON payload
          payload=$(jq -n \
            --arg project "$PROJECT" \
            --arg content "$escaped_content" \
            '{project: $project, content: $content}')

          # Upsert the row into the 'builds' table (adjust table name if needed)
          # Uses 'project' as the conflict key – ensure a unique constraint exists on that column.
          curl -X POST "$SUPABASE_URL/rest/v1/html_docs" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "$payload"
